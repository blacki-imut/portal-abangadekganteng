<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal ABANGADEKGANTENG</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated Gradient Background */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, #000000, #2F6BFF, #B026FF);
      animation: gradientMove 10s infinite linear;
      z-index: -2;
      filter: blur(120px);
      opacity: 0.5;
    }

    @keyframes gradientMove {
      0% { transform: translate(0, 0); }
      50% { transform: translate(-25%, -25%); }
      100% { transform: translate(0, 0); }
    }

    .container {
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 40px rgba(176, 38, 255, 0.3);
      animation: fadeIn 1.5s ease;
      max-width: 400px;
      width: 90%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 1.8rem;
      background: linear-gradient(90deg, #B026FF, #2F6BFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.9rem;
      color: #ccc;
      margin-bottom: 25px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      margin: 12px 0;
      padding: 14px;
      border-radius: 50px;
      background: linear-gradient(90deg, #B026FF, #2F6BFF);
      color: white;
      font-weight: bold;
      transition: 0.3s ease;
      box-shadow: 0 0 20px rgba(176, 38, 255, 0.5);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(47, 107, 255, 0.9);
    }

    footer {
      margin-top: 20px;
      font-size: 0.7rem;
      color: #aaa;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.4rem; }
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>PORTAL RESMI ABANGADEKGANTENG</h1>
    <p>Pilih tujuan yang ingin kamu akses</p>

    <a href="https://adminsecretmod.netlify.app" class="btn">🌐 Situs Web Utama</a>

    <a href="https://YouTube.com/@blacki-2" class="btn">🎮 Top-Up Game</a>

    <footer>© 2026 ABANGADEKGANTENG Portal</footer>
  </div>

</body>
</html>
